site_name: SIMUREX 2026 – pyViewFactor
site_url: https://matbog.github.io/simurex2026-pvf/
site_description: IBPSA 2026 - Ecole thématique SIMUREX - session calcul des Facteurs de Forme
repo_url: https://github.com/matbog/simurex2026-pvf
repo_name: matbog/simurex2026-pvf

theme:
  name: material
  language: fr
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:

    # Mode clair
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-night

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny

      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
extra_css:
  - assets/extra.css
  - assets/code.css
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/open_external_links.js

nav:
  - Accueil: index.md
  - Démarrer: get-started.md
  - Rappels scientifiques: scientific-background.md
  - Visibilité et obstruction: visibility_obstruction.md
  - Exercices & mini-projet: exercises.md
  - À propos de pyviewfactor: about-pyviewfactor.md

copyright: |
